name: CI/CD Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_TOKEN" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ RENDER_TOKEN o RENDER_SERVICE_ID non configurati nei GitHub Secrets"
            echo "Il workflow è configurato ma i secrets sono mancanti"
            exit 1
          fi
          
          echo "🚀 Triggering deploy on Render..."
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
          
          echo "✅ Deploy triggered successfully!"
