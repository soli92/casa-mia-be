services:
  - type: web
    name: casa-mia-be
    env: node
    region: frankfurt
    plan: free
    # `prisma generate` in build; `migrate deploy` allo start (DB da env Render, idempotente).
    buildCommand: npm install && npm run build
    startCommand: npm run prisma:migrate && npm run start
    envVars:
      # Su Render usa il Connection Pooler Supabase (porta 6543) + ?pgbouncer=true — vedi DATABASE_SETUP.md
      # Non committare password: imposta DATABASE_URL nella dashboard Render (o Secret).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://casa-mia-fe.vercel.app
